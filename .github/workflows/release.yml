name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'           # triggers on version tags like v1.3.4
  workflow_dispatch:       # manual trigger from GitHub UI

permissions:
  contents: read
  id-token: write          # required for Workload Identity Federation

jobs:
  build-and-deploy:
    name: Build Signed AAB & Deploy to Internal Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/release.jks

      - name: Build Signed Release Bundle
        working-directory: android-app
        run: ./gradlew bundleProRelease
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/344391280523/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: play-publisher@home-front-alert-hfc.iam.gserviceaccount.com

      - name: Upload AAB to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          packageName: com.attius.homefrontalert
          releaseFiles: android-app/app/build/outputs/bundle/proRelease/app-pro-release.aab
          track: internal
          status: completed
          changesNotSentForReview: false
