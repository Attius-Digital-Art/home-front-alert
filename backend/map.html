<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>מפת התרעות – פיקוד העורף</title>
  <meta name="description" content="מפת התרעות חיה של פיקוד העורף" />

  <!-- MapLibre GL JS (BSD-2) -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; background: #1a1a2e; }

    /* Attribution — minimal, bottom-left */
    .maplibregl-ctrl-attrib {
      font-size: 9px;
      background: rgba(0,0,0,0.55) !important;
      color: #aaa !important;
      border-radius: 4px;
      padding: 2px 5px !important;
    }
    .maplibregl-ctrl-attrib a {
      pointer-events: none !important;
      text-decoration: none !important;
      color: inherit !important;
      cursor: default !important;
    }

    /* Zone tooltip on tap/click */
    #tooltip {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 26, 0.92);
      color: #fff;
      border-radius: 12px;
      padding: 10px 18px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      direction: rtl;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
      display: none;
      max-width: 80vw;
      z-index: 10;
    }
    #tooltip .zone-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    #tooltip .alert-type { opacity: 0.75; font-size: 12px; }

    /* Status badge — top-right */
    #status {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(10,10,26,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 6px #4caf50;
      flex-shrink: 0;
    }
    #status-dot.alert { background: #e53935; box-shadow: 0 0 8px #e53935; animation: pulse 1.2s infinite; }
    #status-dot.pre-warning { background: #ff9800; box-shadow: 0 0 6px #ff9800; animation: pulse 2.0s infinite; }
    #status-dot.offline { background: #757575; box-shadow: none; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(1.3); }
    }

    /* User location dot */
    .user-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #2196f3;
      border: 2.5px solid #fff;
      box-shadow: 0 0 0 3px rgba(33,150,243,0.3);
    }
  </style>
</head>
<body>
<div id="map"></div>
<div id="status">
  <div id="status-dot"></div>
  <span id="status-text">טוען…</span>
</div>
<div id="tooltip">
  <div class="zone-name" id="tt-zone"></div>
  <div class="alert-type" id="tt-type"></div>
</div>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────
const MAP_DATA_URL  = '/api/map-data';   // relative — same Cloud Run service
const POLL_INTERVAL = 30000;            // 30s — cleanup/expiry only; alerts arrive via FCM-triggered JS bridge

// ── Terminology (SSOT from Android) ──────────────────────────────────────
let ALERT_LABELS = {
  he: { ROCKET: 'ירי רקטות וטילים', UAV: 'חדירת כלי טיס עוין', INFILTRATION: 'חדירת מחבלים', PRE_WARNING: 'התרעה מוקדמת', OTHER: 'אירוע ביטחוני' },
  en: { ROCKET: 'Rocket / Missile Fire', UAV: 'Hostile UAV Incursion', INFILTRATION: 'Terrorist Infiltration', PRE_WARNING: 'Pre-Warning', OTHER: 'Security Incident' },
};

// STATUS_LABELS mirrors strings.xml exactly for SSOT consistency.
// Keys map: no_alerts=no_alerts, threat=threat_status, warning=warning_status, critical=critical_status
// Overwritten at runtime by loadStrings() from status_strings.json (generated from Android XMLs).
let STATUS_LABELS = {
  he: { 
    loading: 'טוען…', 
    no_alerts: 'אין התרעות', 
    threat: 'איום מרוחק',
    warning: 'אזהרה',
    critical: 'קריטי',
    offline: 'אין חיבור' 
  },
  en: { 
    loading: 'Loading…', 
    no_alerts: 'NO ALERTS', 
    threat: 'REMOTE THREAT',
    warning: 'WARNING',
    critical: 'CRITICAL',
    offline: 'No connection' 
  },
};

let userZone = null;
window.setUserZone = (name) => {
  if (!name) return;
  userZone = name.trim();
  console.log(`📍 User Zone Set: ${userZone}`);
  if (typeof fetchAndRender === 'function') fetchAndRender();
};

async function loadStrings() {
  try {
    const res = await fetch('/status_strings.json');
    if (!res.ok) return;
    const data = await res.json();
    // Sync all four status states from Android strings.xml (via extract_strings.js)
    for (const lang of ['en', 'he']) {
      if (data[lang]) {
        STATUS_LABELS[lang].no_alerts = data[lang].no_alerts || STATUS_LABELS[lang].no_alerts;
        STATUS_LABELS[lang].threat    = data[lang].threat    || STATUS_LABELS[lang].threat;
        STATUS_LABELS[lang].warning   = data[lang].warning   || STATUS_LABELS[lang].warning;
        STATUS_LABELS[lang].critical  = data[lang].critical  || STATUS_LABELS[lang].critical;
      }
    }
    console.log('✅ Synchronized strings with Android app.');
    if (typeof fetchAndRender === 'function') fetchAndRender();
  } catch (e) {
    console.warn('Using fallback strings', e);
  }
}
loadStrings();

// Language set by Android JS bridge (defaults to Hebrew)
let appLang = 'he';
window.setAppLanguage = (lang) => {
  appLang = (lang && (lang.startsWith('iw') || lang === 'he')) ? 'he' : 'en';
  document.documentElement.lang = appLang;
  document.documentElement.dir  = appLang === 'he' ? 'rtl' : 'ltr';
  if (typeof fetchAndRender === 'function') fetchAndRender();
};

const L = () => STATUS_LABELS[appLang];
const AL = () => ALERT_LABELS[appLang];

// ── Map setup ─────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    // No external tile sources — pure dark canvas.
    // Country outline is loaded separately as our own GeoJSON after map.on('load').
    sources: {},
    layers: [
      // Deep dark background = "sea" / off-territory
      { id: 'bg', type: 'background', paint: { 'background-color': '#0a0a18' } },
    ],
  },
  center: [34.85, 31.5],   // Israel centre
  zoom: 7,
  minZoom: 5,
  maxZoom: 17,
  attributionControl: false,
  logoPosition: 'bottom-left',
});

// Disable rotation (irrelevant for alert map)
map.dragRotate.disable();
map.touchZoomRotate.disableRotation();

// ── User location ─────────────────────────────────────────────────────────
let userMarker = null;

function setUserLocation(lat, lng) {
  if (!lat || !lng) return;
  const el = document.createElement('div');
  el.className = 'user-dot';
  if (userMarker) userMarker.remove();
  userMarker = new maplibregl.Marker({ element: el })
    .setLngLat([lng, lat])
    .addTo(map);
}

// Android JS bridge injection point
window.onLocationUpdate = setUserLocation;

// Fallback: browser geolocation
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    (p) => setUserLocation(p.coords.latitude, p.coords.longitude),
    () => {},
    { timeout: 8000, maximumAge: 60000 }
  );
}

// ── Layer management ──────────────────────────────────────────────────────
const managedLayers  = new Set();
const managedSources = new Set();

// Separate tracking for clearing zones — these have their own 15-min lifecycle
// and must NOT be wiped by clearAlertLayers().
const clearingLayers  = new Set();
const clearingSources = new Set();
const CLEAR_FADE_MS   = 15 * 60 * 1000;
const clearingMeta    = {};  // fillLayerId → { clearedAt }

function clearAlertLayers() {
  for (const id of managedLayers)  { try { map.removeLayer(id);  } catch {} }
  for (const id of managedSources) { try { map.removeSource(id); } catch {} }
  managedLayers.clear();
  managedSources.clear();
  // Clearing layers are intentionally preserved — they age out independently
}

/**
 * Add map layers for one cluster.
 * Layer order (bottom to top):
 *   hull    – very transparent convex hull showing broader affected area
 *   glow    – soft outer fill (toned down)
 *   fill    – main fill (toned down)
 *   border  – crisp edge line (full opacity — unchanged)
 *   recent  – brighter overlay for individual zones added < 15s ago
 */
function addClusterLayers(cluster) {
  const sid      = `src-${cluster.id}`;
  const hullId   = `hull-${cluster.id}`;
  const glowId   = `glow-${cluster.id}`;
  const fillId   = `fill-${cluster.id}`;
  const borderId = `border-${cluster.id}`;
  const recentId = `recent-${cluster.id}`;

  const geojson = {
    type: 'Feature',
    properties: { name: cluster.zones.join(', '), alertType: cluster.alertType },
    geometry: cluster.geometry,
  };
  map.addSource(sid, { type: 'geojson', data: geojson });
  managedSources.add(sid);

  // ── Underlying area hint (convex hull, very transparent) ────────────────────
  if (cluster.hullGeometry) {
    const hullSrc = `src-hull-${cluster.id}`;
    map.addSource(hullSrc, { type: 'geojson', data: { type: 'Feature', properties: {}, geometry: cluster.hullGeometry } });
    map.addLayer({ id: hullId, type: 'fill', source: hullSrc, paint: { 'fill-color': cluster.color, 'fill-opacity': 0.07 } });
    managedSources.add(hullSrc);
    managedLayers.add(hullId);
  }

  // ── Outer glow (toned down) ────────────────────────────────────────────
  map.addLayer({ id: glowId,   type: 'fill', source: sid, paint: { 'fill-color': cluster.color, 'fill-opacity': 0.10 } });

  // ── Main fill (toned down) ────────────────────────────────────────────
  map.addLayer({ id: fillId,   type: 'fill', source: sid, paint: { 'fill-color': cluster.color, 'fill-opacity': 0.26 } });

  // ── Crisp border (full opacity — unchanged) ──────────────────────────────
  map.addLayer({ id: borderId, type: 'line', source: sid, paint: { 'line-color': cluster.border, 'line-width': 2.2, 'line-opacity': 0.92 } });

  managedLayers.add(glowId);
  managedLayers.add(fillId);
  managedLayers.add(borderId);

  // ── Recent zones overlay (individual polygons added < 15s ago) ──────────────
  if (cluster.recentZoneGeometries && cluster.recentZoneGeometries.length > 0) {
    const recentSrc = `src-recent-${cluster.id}`;
    map.addSource(recentSrc, {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: cluster.recentZoneGeometries.map(g => ({ type: 'Feature', properties: {}, geometry: g })),
      },
    });
    map.addLayer({ id: recentId, type: 'fill', source: recentSrc, paint: { 'fill-color': cluster.color, 'fill-opacity': 0.52 } });
    managedSources.add(recentSrc);
    managedLayers.add(recentId);
  }

  // Click/tap → show tooltip
  map.on('click', fillId, (e) => {
    const props = e.features?.[0]?.properties ?? {};
    showTooltip(props.name, props.alertType);
  });
}

// ── Clearing zone animation (green → transparent over 15 min) ────────────────

function addClearingZoneLayer(zone) {
  const fillId = `cfill-${zone.id}`;
  if (clearingLayers.has(fillId)) return;  // Already rendering this zone

  const elapsed = Date.now() - zone.clearedAt;
  if (elapsed >= CLEAR_FADE_MS) return;   // Already fully faded

  const opacity = (1 - elapsed / CLEAR_FADE_MS) * 0.55;
  const sid = `csrc-${zone.id}`;

  try {
    map.addSource(sid, { type: 'geojson', data: { type: 'Feature', properties: {}, geometry: zone.geometry } });
    map.addLayer({ id: fillId, type: 'fill', source: sid, paint: { 'fill-color': '#4CAF50', 'fill-opacity': opacity } });
    clearingSources.add(sid);
    clearingLayers.add(fillId);
    clearingMeta[fillId] = { clearedAt: zone.clearedAt };
  } catch (e) {
    console.warn('[map] clearing layer error:', e.message);
  }
}

function updateClearingOpacities() {
  const now = Date.now();
  for (const fillId of Array.from(clearingLayers)) {
    const meta = clearingMeta[fillId];
    if (!meta) continue;
    const elapsed = now - meta.clearedAt;
    if (elapsed >= CLEAR_FADE_MS) {
      try { map.removeLayer(fillId); } catch {}
      const sid = fillId.replace('cfill-', 'csrc-');
      try { map.removeSource(sid); } catch {}
      clearingLayers.delete(fillId);
      clearingSources.delete(sid);
      delete clearingMeta[fillId];
    } else {
      const opacity = (1 - elapsed / CLEAR_FADE_MS) * 0.55;
      try { map.setPaintProperty(fillId, 'fill-opacity', opacity); } catch {}
    }
  }
}

// ── Heatmap layers (diffuse glow underneath all zone polygons) ─────────────
// Two separate heatmaps: urgent (red gradient) + pre-warning (amber gradient).
// Radius and intensity are zoom-interpolated so the glow scales naturally.

function addHeatmapLayers(data) {
  const radiusExpr = ['interpolate', ['linear'], ['zoom'], 5, 40, 10, 110, 14, 240];
  const weightExpr = ['coalesce', ['get', 'weight'], 1];

  function addHeatmap(id, geojson, colorStops, intensity, opacity) {
    if (!geojson || geojson.features.length === 0) return;
    const srcId   = `hsrc-${id}`;
    const layerId = `hlyr-${id}`;
    map.addSource(srcId, { type: 'geojson', data: geojson });
    map.addLayer({
      id: layerId, type: 'heatmap', source: srcId,
      paint: {
        'heatmap-weight':    weightExpr,
        'heatmap-radius':    radiusExpr,
        'heatmap-intensity': ['interpolate', ['linear'], ['zoom'], 5, intensity * 0.5, 10, intensity, 14, intensity * 2],
        'heatmap-opacity':   opacity,
        'heatmap-color':     ['interpolate', ['linear'], ['heatmap-density'], ...colorStops],
      },
    });
    managedLayers.add(layerId);
    managedSources.add(srcId);
  }

  // Urgent (ROCKET / UAV / INFILTRATION) — red gradient matching #E53935 → #B71C1C
  addHeatmap('urgent', data.urgentPoints, [
    0,    'rgba(0,0,0,0)',
    0.15, 'rgba(229,57,53,0.0)',
    0.4,  'rgba(229,57,53,0.30)',
    0.7,  'rgba(183,28,28,0.55)',
    1.0,  'rgba(183,28,28,0.80)',
  ], 0.9, 0.70);

  // Pre-warning (PRE_WARNING / OTHER) — amber gradient matching #FDD835 → #F9A825
  addHeatmap('prewarning', data.preWarningPoints, [
    0,    'rgba(0,0,0,0)',
    0.15, 'rgba(253,216,53,0.0)',
    0.4,  'rgba(253,216,53,0.32)',
    0.7,  'rgba(249,168,37,0.58)',
    1.0,  'rgba(249,168,37,0.82)',
  ], 0.7, 0.62);
}

// ── Tooltip ───────────────────────────────────────────────────────────────
let tooltipTimer;
function showTooltip(zones, alertType) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-zone').textContent = zones || '';
  document.getElementById('tt-type').textContent = AL()[alertType] ?? alertType;
  tt.style.display = 'block';
  clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(() => { tt.style.display = 'none'; }, 4000);
}

// Tap outside → hide
map.on('click', () => {
  setTimeout(() => { document.getElementById('tooltip').style.display = 'none'; }, 50);
});

// ── Data polling ──────────────────────────────────────────────────────────
const dot  = document.getElementById('status-dot');
const text = document.getElementById('status-text');

async function fetchAndRender() {
  try {
    const res  = await fetch(MAP_DATA_URL, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    clearAlertLayers();

    // Update clearing zone fade opacities (runs even when no active clusters)
    updateClearingOpacities();

    // Add newly cleared zones received from server
    if (data.clearingZones && data.clearingZones.length > 0) {
      for (const zone of data.clearingZones) {
        addClearingZoneLayer(zone);
      }
    }

    // Heatmap layers first — must be added before cluster layers to stay underneath
    addHeatmapLayers(data);

    if (!data.clusters || data.clusters.length === 0) {
      dot.className    = 'status-dot';
      text.textContent = L().no_alerts;
      return;
    }

    let isUserAreaAlerted = false;
    let hasPreWarningInUserArea = false;
    let hasAnyClusters = false;

    for (const cluster of data.clusters) {
      addClusterLayers(cluster);

      const isUrgent = cluster.alertType === 'ROCKET' || cluster.alertType === 'UAV' || cluster.alertType === 'INFILTRATION';
      const isPreWarning = cluster.alertType === 'PRE_WARNING' || cluster.alertType === 'OTHER';
      const containsUser = userZone && cluster.zones && cluster.zones.includes(userZone);

      if (containsUser && isUrgent)     isUserAreaAlerted = true;
      if (containsUser && isPreWarning) hasPreWarningInUserArea = true;
      hasAnyClusters = true;
    }

    // 4-state model — mirrors dashboard exactly
    if (isUserAreaAlerted) {
      dot.className    = 'status-dot alert';
      text.textContent = L().critical;
    } else if (hasPreWarningInUserArea) {
      dot.className    = 'status-dot pre-warning';
      text.textContent = L().warning;
    } else if (hasAnyClusters) {
      dot.className    = 'status-dot alert';
      text.textContent = L().threat;
    }

  } catch (err) {
    dot.className    = 'status-dot offline';
    text.textContent = L().offline;
    console.warn('[map] poll error:', err.message);
  }
}

map.on('load', async () => {
  // Load our own country outline (Israel + Judea & Samaria as one territory).
  // Fill-only — no line layer — so the boundary between features (Green Line) is never rendered.
  try {
    const r = await fetch('/api/country-outline', { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      const outline = await r.json();
      map.addSource('country-src', { type: 'geojson', data: outline });
      // Land fill: slightly lighter dark tone than the #0a0a18 background
      map.addLayer({
        id:     'country-fill',
        type:   'fill',
        source: 'country-src',
        paint:  { 'fill-color': '#18182e', 'fill-opacity': 1 },
      });
    }
  } catch (e) {
    console.warn('[map] country outline unavailable:', e.message);
  }

  fetchAndRender();
  setInterval(fetchAndRender, POLL_INTERVAL);
});

</script>
</body>
</html>
