steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest']

  # Deploy minimal relay (min=1 keeps the HFC polling loop alive 24/7)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--memory=256Mi'
      - '--no-cpu-throttling'
      - '--update-env-vars=NODE_ENV=production'
      - '--update-secrets=API_KEYS=$_API_KEYS_SECRET:latest'

images:
  - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest'

substitutions:
  _SERVICE_NAME: homefront-backend
  _REGION: me-west1
  _AR_HOSTNAME: me-west1-docker.pkg.dev
  _AR_REPOSITORY: backend-repo
  _API_KEYS_SECRET: homefront-backend-api-keys

options:
  logging: CLOUD_LOGGING_ONLY
