<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Home Front Proxy</title>
  </head>
  <body>
    <h1>Home Front Bypass Proxy</h1>
    <p>This site proxies requests to the Home Front Command Backend.</p>
    <p>Status: <span id="status">Checking...</span></p>
    <script>
      fetch('/health')
        .then(r => r.json().then(data => ({ ok: r.ok, data })))
        .then(({ ok, data }) => {
          const el = document.getElementById('status');
          el.innerText = ok ? 'Backend Online' : 'Backend Degraded (' + data.status + ')';
        })
        .catch(err => {
          document.getElementById('status').innerText = 'Error: ' + err.message;
        });
    </script>
  </body>
</html>
