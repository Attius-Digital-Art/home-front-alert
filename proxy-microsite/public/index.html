<script>
// ── i18n toggle ─────────────────────────────────────────────────────
const i18n = {
  en: {
    'hero-subtitle': 'Real-Time Home Front Alerts',
    'feat-alerts': 'Real-time push alerts',
    'feat-map': 'Live threat map',
    'feat-audio': 'Distance-mapped audio',
    'download': 'Download on Google Play',
    'view-map': 'View Live Map',
    'map-banner': 'Get alerts on your phone \u2014 Download Tzeva Artzi',
  },
  he: {
    'hero-subtitle': '\u05D4\u05EA\u05E8\u05E2\u05D5\u05EA \u05E4\u05D9\u05E7\u05D5\u05D3 \u05D4\u05E2\u05D5\u05E8\u05E3 \u05D1\u05D6\u05DE\u05DF \u05D0\u05DE\u05EA',
    'feat-alerts': '\u05D4\u05EA\u05E8\u05E2\u05D5\u05EA \u05D1\u05D6\u05DE\u05DF \u05D0\u05DE\u05EA',
    'feat-map': '\u05DE\u05E4\u05EA \u05D0\u05D9\u05D5\u05DE\u05D9\u05DD \u05D7\u05D9\u05D4',
    'feat-audio': '\u05E6\u05DC\u05D9\u05DC \u05DE\u05D5\u05EA\u05D0\u05DD \u05DC\u05DE\u05E8\u05D7\u05E7',
    'download': '\u05D4\u05D5\u05E8\u05D3\u05D4 \u05DE-Google Play',
    'view-map': '\u05E6\u05E4\u05D4 \u05D1\u05DE\u05E4\u05D4 \u05D4\u05D7\u05D9\u05D4',
    'map-banner': '\u05E7\u05D1\u05DC \u05D4\u05EA\u05E8\u05E2\u05D5\u05EA \u05D1\u05E0\u05D9\u05D9\u05D3 \u2014 \u05D4\u05D5\u05E8\u05D3 \u05D0\u05EA \u05E6\u05D1\u05E2 \u05D0\u05E8\u05E6\u05D9',
  }
};

let currentLang = 'en';

function toggleLang() {
  currentLang = currentLang === 'en' ? 'he' : 'en';
  applyLang(currentLang);
}

function applyLang(lang) {
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
  const strings = i18n[lang];
  // Update hero subtitle
  const subtitle = document.getElementById('hero-subtitle');
  if (subtitle && strings['hero-subtitle']) subtitle.textContent = strings['hero-subtitle'];
  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key]) el.textContent = strings[key];
  });
  // Update map language
  if (typeof window.setAppLanguage === 'function') {
    window.setAppLanguage(lang);
  }
  document.getElementById('lang-btn').textContent = lang === 'en' ? 'HE / EN' : 'EN / HE';
}

// Auto-detect language
const bl = (navigator.language || '').toLowerCase();
if (bl.startsWith('he') || bl.startsWith('iw')) {
  currentLang = 'he';
  applyLang('he');
}
</script>
